name: CI

on:
  push:
    branches:
      - dev
      - main

  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Frontend
      - name: Install Frontend Dependencies
        working-directory: frontend/project
        run: npm install

      - name: Build Frontend
        working-directory: frontend/project
        run: npm run build
      - name: Build Frontend Docker Image
        run: docker build -t frontend-image ./frontend/project

      # Backend
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Build Backend
        working-directory: backend
        run: npm run build

      - name: Build Backend Docker Image
        run: docker build -t backend-image ./backend

      - name: List Docker Images
        run: docker images

      - name: CI Success
        run: echo "🎉 Frontend and Backend built successfully!"
